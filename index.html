<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OddGenius PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0a1a2f;color:white;text-align:center;}
.nav{background:#08121f;padding:10px;}
button{padding:10px;border:none;border-radius:10px;margin:5px;background:#00c2ff;color:white;}
.card{background:#1c2f45;margin:15px;padding:15px;border-radius:15px;}
.match{background:#233a55;margin:10px;padding:15px;border-radius:10px;}
input,select{padding:10px;border-radius:10px;border:none;}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('home')">🏠 Home</button>
<button onclick="show('matches')">⚽ Matches</button>
<button onclick="show('vip')">👑 VIP</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<h2 onclick="tapAdmin()">⚽ OddGenius AI</h2>

<!-- LOGIN -->
<div id="login">
<div class="card">
<h3>Login / Register</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>
<button onclick="loginUser()">Login</button>
</div>
</div>

<!-- HOME -->
<div id="home" style="display:none">
<div class="card">
<h3 id="welcome"></h3>
</div>

<div class="card">
<h3>💰 Help</h3>
<p>Lipa Mix: <b>0702289410 (SALEHE MGONJA)</b></p>
<p>WhatsApp: <b>0757453979</b></p>

<a href="https://wa.me/255757453979" target="_blank">
<button>📲 WhatsApp</button>
</a>
</div>
</div>

<!-- MATCHES -->
<div id="matches" style="display:none">
<div class="card">
<button onclick="loadToday()">Today</button>
<button onclick="loadTomorrow()">Tomorrow</button>
<button onclick="loadLive()">Live</button>
</div>
<div id="results"></div>
</div>

<!-- VIP -->
<div id="vip" style="display:none">
<div class="card">
<h3>Enter VIP Code</h3>
<input id="vipCode">
<button onclick="activateVIP()">Activate</button>
</div>

<div id="vipArea" style="display:none">
<button onclick="openVIP()">🚀 Enter VIP</button>
</div>
</div>

<!-- VIP PAGE -->
<div id="vipPage" style="display:none">
<h2>👑 VIP STRONG PICKS</h2>
<button onclick="loadVIP()">Generate VIP</button>
<div id="vipResults"></div>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">
<div class="card">
<h3>🔐 Admin Dashboard</h3>

<select id="days">
<option value="1">1 Day</option>
<option value="7">1 Week</option>
<option value="30">1 Month</option>
</select>

<br><br>

<button onclick="genCode()">Generate VIP Code</button>

<p id="codeOut"></p>

</div>
</div>

<script>

// API
const API_KEY="109d084d11d7d324358664fe158a41c9";

// NAV
function show(x){
["home","matches","vip","vipPage","admin"].forEach(i=>{
document.getElementById(i).style.display="none";
});
document.getElementById(x).style.display="block";
}

// LOGIN
function register(){
localStorage.setItem(email.value,pass.value);
alert("Registered");
}

function loginUser(){
if(localStorage.getItem(email.value)===pass.value){
localStorage.setItem("user",email.value);
login.style.display="none";
show("home");
welcome.innerText="Welcome "+email.value;
}else alert("Wrong");
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

// AUTO LOGIN
window.onload=function(){
let u=localStorage.getItem("user");
if(u){
login.style.display="none";
show("home");
welcome.innerText="Welcome "+u;

let vip=localStorage.getItem("vip_"+u);
if(vip && Date.now()<vip){
vipArea.style.display="block";
}
}
}

// FETCH MATCHES
async function fetchMatches(url){

results.innerHTML="⏳ Loading...";

try{
let res=await fetch(url,{headers:{"x-apisports-key":API_KEY}});
let data=await res.json();

if(!data.response || data.response.length===0){
results.innerHTML="❌ No matches";
return;
}

// LIMIT (FREE)
let matches=data.response.slice(0,8);

displayMatches(matches);

}catch(e){
results.innerHTML="⚠️ API Error / Limit";
}
}

// DISPLAY
function displayMatches(matches){

let out="";

matches.forEach(g=>{

let date=g.fixture.date.split("T")[0];
let time=g.fixture.date.split("T")[1].slice(0,5);

let tip=getPrediction();
let conf=getConfidence();

out+=`
<div class="match">
<h3>${g.teams.home.name} vs ${g.teams.away.name}</h3>
<p>${g.league.name}</p>
<p>${date} ${time}</p>
<p>Tip: ${tip}</p>
<p>Accuracy: ${conf}%</p>
</div>`;
});

results.innerHTML=out;
}

// AI
function getPrediction(){
return ["Over 2.5","GG","Home Win"][Math.floor(Math.random()*3)];
}

function getConfidence(){
return Math.floor(Math.random()*20)+70;
}

// BUTTONS
function loadToday(){
fetchMatches(`https://v3.football.api-sports.io/fixtures?date=${getDate(0)}`);
}
function loadTomorrow(){
fetchMatches(`https://v3.football.api-sports.io/fixtures?date=${getDate(1)}`);
}
function loadLive(){
fetchMatches(`https://v3.football.api-sports.io/fixtures?live=all`);
}

// DATE
function getDate(offset=0){
let d=new Date();
d.setDate(d.getDate()+offset);
return d.toLocaleDateString('en-CA');
}

// VIP
function activateVIP(){
let code=vipCode.value;
let exp=localStorage.getItem(code);
let u=localStorage.getItem("user");

if(exp && Date.now()<exp){
localStorage.setItem("vip_"+u,exp);
vipArea.style.display="block";
alert("VIP Activated");
}else alert("Invalid code");
}

function openVIP(){
show("vipPage");
}

// VIP PICKS (STRONG)
async function loadVIP(){

vipResults.innerHTML="⏳ Loading VIP...";

try{
let res=await fetch(`https://v3.football.api-sports.io/fixtures?next=10`,{
headers:{"x-apisports-key":API_KEY}
});

let data=await res.json();

let picks=data.response.sort(()=>0.5-Math.random()).slice(0,4);

let out="";

picks.forEach(g=>{
let tip=["Over 1.5","GG","1X"][Math.floor(Math.random()*3)];
let conf=Math.floor(Math.random()*5)+92;

out+=`
<div class="match">
<h3>${g.teams.home.name} vs ${g.teams.away.name}</h3>
<p>${g.league.name}</p>
<p>🔥 ${tip}</p>
<p>🎯 ${conf}%</p>
</div>`;
});

vipResults.innerHTML=out;

}catch(e){
vipResults.innerHTML="⚠️ Error";
}
}

// ADMIN
function genCode(){
let code="VIP"+Math.floor(Math.random()*999999);
let days=parseInt(days.value);

let exp=Date.now()+days*86400000;

localStorage.setItem(code,exp);
codeOut.innerText=code;
}

// SECRET ADMIN
let taps=0;

function tapAdmin(){
taps++;

if(taps==5){
let p=prompt("Enter Admin Password");
if(p==="admin123") show("admin");
taps=0;
}

setTimeout(()=>taps=0,2000);
}

</script>

</body>
    </html>
