<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OddGenius PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0a1a2f;color:white;text-align:center;}
.nav{background:#08121f;padding:10px;}
button{padding:10px;border:none;border-radius:10px;margin:5px;background:#00c2ff;color:white;}
.card{background:#1c2f45;margin:15px;padding:15px;border-radius:15px;}
.match{background:#233a55;margin:10px;padding:15px;border-radius:10px;}
select,input{padding:10px;border-radius:10px;border:none;}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('home')">🏠 Home</button>
<button onclick="show('matches')">⚽ Matches</button>
<button onclick="show('vip')">👑 VIP</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<h2 onclick="tapAdmin()">⚽ OddGenius AI</h2>

<!-- LOGIN -->
<div id="login">
<div class="card">
<h3>Login / Register</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>
<button onclick="loginUser()">Login</button>
</div>
</div>

<!-- HOME -->
<div id="home" style="display:none">
<div class="card">
<h3 id="welcome"></h3>
</div>

<div class="card">
<h3>💰 Payment & Help</h3>
<p>Lipa Mix: <b>0702289410 (SALEHE MGONJA)</b></p>
<p>Tuma Screenshot: <b>0757453979</b></p>

<a href="https://wa.me/255757453979" target="_blank">
<button>📲 WhatsApp</button>
</a>
</div>
</div>

<!-- MATCHES -->
<div id="matches" style="display:none">
<div class="card">

<button onclick="setMode('today')">Today</button>
<button onclick="setMode('tomorrow')">Tomorrow</button>
<button onclick="setMode('live')">Live</button>

<br><br>

<select id="league">
<option value="all">All Leagues</option>
<option value="39">EPL</option>
<option value="140">La Liga</option>
<option value="78">Bundesliga</option>
<option value="135">Serie A</option>
</select>

<br><br>
<button onclick="loadMatches()">Load Matches</button>

</div>

<div id="results"></div>
</div>

<!-- VIP -->
<div id="vip" style="display:none">
<div class="card">
<h3>Enter VIP Code</h3>
<input id="vipCode">
<button onclick="activateVIP()">Activate</button>
</div>

<div id="vipArea" style="display:none">
<div class="card">
<button onclick="openVIP()">🚀 Enter VIP</button>
</div>
</div>
</div>

<!-- VIP PAGE -->
<div id="vipPage" style="display:none">
<div class="nav">
<button onclick="loadVIPMatches()">🔥 VIP Picks</button>
<button onclick="exitVIP()">🚪 Exit</button>
</div>
<h2>👑 VIP STRONG PICKS</h2>
<div id="vipResults"></div>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">
<div class="card">
<h3>Generate VIP Code</h3>

<select id="days">
<option value="1">1 Day</option>
<option value="7">1 Week</option>
<option value="30">1 Month</option>
</select>

<br><br>
<button onclick="genCode()">Generate</button>

<p id="codeOut"></p>
</div>
</div>

<script>

const API_KEY="YOUR_API_KEY_HERE";
let mode="today";

// NAV
function show(x){
["home","matches","vip","vipPage","admin"].forEach(i=>{
document.getElementById(i).style.display="none";
});
document.getElementById(x).style.display="block";
}

// REGISTER
function register(){
let email=emailInput().value;
let pass=passInput().value;
if(!email||!pass)return alert("Weka email na password");
localStorage.setItem(email,pass);
alert("Registered");
}

// LOGIN
function loginUser(){
let email=emailInput().value;
let pass=passInput().value;
if(localStorage.getItem(email)===pass){
localStorage.setItem("currentUser",email);
document.getElementById("login").style.display="none";
show("home");
welcome.innerText="Welcome "+email;
}else alert("Wrong login");
}

function emailInput(){return document.getElementById("email")}
function passInput(){return document.getElementById("pass")}

// LOGOUT
function logout(){localStorage.removeItem("currentUser");location.reload();}

// AUTO LOGIN
window.onload=function(){
let u=localStorage.getItem("currentUser");
if(u){
login.style.display="none";
show("home");
welcome.innerText="Welcome "+u;

let vip=localStorage.getItem("vip_"+u);
if(vip && Date.now()<vip){
vipArea.style.display="block";
}
}
}

// MODE
function setMode(m){mode=m;}

// DATE
function getDate(o=0){
let d=new Date();
d.setDate(d.getDate()+o);
return d.toLocaleDateString('en-CA');
}

// AI SIMPLE
function getPrediction(){
return ["Over 2.5","GG","Home Win"][Math.floor(Math.random()*3)];
}
function getConfidence(){
return Math.floor(Math.random()*20)+70;
}

// MATCHES
async function loadMatches(){
results.innerHTML="Loading...";
let url=`https://v3.football.api-sports.io/fixtures?date=${getDate(0)}`;
let res=await fetch(url,{headers:{"x-apisports-key":API_KEY}});
let data=await res.json();

let out="";
data.response.forEach(g=>{
let tip=getPrediction();
let conf=getConfidence();
let d=g.fixture.date.split("T")[0];
let t=g.fixture.date.split("T")[1].slice(0,5);

out+=`<div class="match">
<h3>${g.teams.home.name} vs ${g.teams.away.name}</h3>
<p>${g.league.name}</p>
<p>${d} ${t}</p>
<p>${tip}</p>
<p>${conf}%</p>
</div>`;
});
results.innerHTML=out||"No matches";
}

// VIP MATCHES
async function loadVIPMatches(){
let u=localStorage.getItem("currentUser");
let vip=localStorage.getItem("vip_"+u);

if(!vip || Date.now()>vip) return alert("VIP expired");

vipResults.innerHTML="Loading...";

let res=await fetch(`https://v3.football.api-sports.io/fixtures?date=${getDate(0)}`,{
headers:{"x-apisports-key":API_KEY}
});

let data=await res.json();

let out="";
data.response.slice(0,4).forEach(g=>{
let tip=["1X","GG","Over 1.5"][Math.floor(Math.random()*3)];
let conf=Math.floor(Math.random()*5)+90;

let d=g.fixture.date.split("T")[0];
let t=g.fixture.date.split("T")[1].slice(0,5);

out+=`<div class="match">
<h3>${g.teams.home.name} vs ${g.teams.away.name}</h3>
<p>${g.league.name}</p>
<p>${d} ${t}</p>
<p>${tip}</p>
<p>${conf}%</p>
</div>`;
});

vipResults.innerHTML=out;
}

// VIP
function activateVIP(){
let code=vipCode.value;
let exp=localStorage.getItem(code);
let u=localStorage.getItem("currentUser");

if(exp && Date.now()<exp){
localStorage.setItem("vip_"+u,exp);
vipArea.style.display="block";
alert("VIP Active");
}else alert("Invalid code");
}

function openVIP(){show("vipPage")}
function exitVIP(){show("home")}

// ADMIN
function genCode(){
let code="VIP"+Math.floor(Math.random()*999999);
let days=parseInt(document.getElementById("days").value);
let exp=Date.now()+days*86400000;

localStorage.setItem(code,exp);
document.getElementById("codeOut").innerText=code;
}

// SECRET ADMIN
let taps=0;
function tapAdmin(){
taps++;
if(taps==5){
let p=prompt("Password");
if(p==="admin123") show("admin");
taps=0;
}
setTimeout(()=>taps=0,2000);
}

</script>

</body>
    </html>
