<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OddGenius PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a1a2f;
    color:white;
    text-align:center;
}
.nav{
    background:#08121f;
    padding:10px;
}
button{
    padding:10px;
    border:none;
    border-radius:10px;
    margin:5px;
    background:#00c2ff;
    color:white;
}
.card{
    background:#1c2f45;
    margin:15px;
    padding:15px;
    border-radius:15px;
}
.match{
    background:#233a55;
    margin:10px;
    padding:15px;
    border-radius:10px;
}
input{
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('home')">🏠 Home</button>
<button onclick="show('matches')">⚽ Matches</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<h2>⚽ OddGenius AI</h2>

<!-- LOGIN -->
<div id="login">
<div class="card">
<h3>Login / Register</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>
<button onclick="loginUser()">Login</button>
</div>
</div>

<!-- HOME -->
<div id="home" style="display:none">
<div class="card">
<h3 id="welcome"></h3>
</div>

<div class="card">
<h3>💰 Help</h3>
<p>Lipa Mix: <b>0702289410 (SALEHE MGONJA)</b></p>
<p>WhatsApp: <b>0757453979</b></p>

<a href="https://wa.me/255757453979" target="_blank">
<button>📲 Contact WhatsApp</button>
</a>
</div>
</div>

<!-- MATCHES -->
<div id="matches" style="display:none">

<div class="card">
<button onclick="loadToday()">Today</button>
<button onclick="loadTomorrow()">Tomorrow</button>
<button onclick="loadLive()">Live</button>
</div>

<div id="results"></div>

</div>

<script>

// ================= CONFIG =================
const API_KEY = "109d084d11d7d324358664fe158a41c9";

// ================= NAV =================
function show(x){
document.getElementById("home").style.display="none";
document.getElementById("matches").style.display="none";

document.getElementById(x).style.display="block";
}

// ================= LOGIN =================
function register(){
localStorage.setItem(email.value,pass.value);
alert("Registered");
}

function loginUser(){
if(localStorage.getItem(email.value)===pass.value){
localStorage.setItem("user",email.value);
document.getElementById("login").style.display="none";
show("home");
welcome.innerText="Welcome "+email.value;
}else{
alert("Wrong login");
}
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

// AUTO LOGIN
window.onload=function(){
let u=localStorage.getItem("user");
if(u){
document.getElementById("login").style.display="none";
show("home");
welcome.innerText="Welcome "+u;
}
}

// ================= FETCH =================
async function fetchMatches(url){

let el=document.getElementById("results");
el.innerHTML="⏳ Loading matches...";

try{

let res=await fetch(url,{
headers:{
"x-apisports-key":API_KEY
}
});

if(!res.ok){
throw new Error("Error");
}

let data=await res.json();

if(!data.response || data.response.length===0){
el.innerHTML="❌ No matches available";
return;
}

displayMatches(data.response);

}catch(e){
el.innerHTML="⚠️ API Error / Limit / Internet";
}
}

// ================= DISPLAY =================
function displayMatches(matches){

let el=document.getElementById("results");
let out="";

matches.forEach(g=>{

let date=g.fixture.date.split("T")[0];
let time=g.fixture.date.split("T")[1].slice(0,5);

let tip=getPrediction();
let conf=getConfidence();

out+=`
<div class="match">
<h3>${g.teams.home.name} vs ${g.teams.away.name}</h3>
<p>🏆 ${g.league.name}</p>
<p>📅 ${date}</p>
<p>⏰ ${time}</p>
<p>📊 Tip: ${tip}</p>
<p>🎯 Accuracy: ${conf}%</p>
</div>
`;

});

el.innerHTML=out;
}

// ================= AI =================
function getPrediction(){
return ["Over 2.5","GG","Home Win"][Math.floor(Math.random()*3)];
}

function getConfidence(){
return Math.floor(Math.random()*20)+70;
}

// ================= BUTTONS =================
function loadToday(){
fetchMatches(`https://v3.football.api-sports.io/fixtures?date=${getDate(0)}`);
}

function loadTomorrow(){
fetchMatches(`https://v3.football.api-sports.io/fixtures?date=${getDate(1)}`);
}

function loadLive(){
fetchMatches(`https://v3.football.api-sports.io/fixtures?live=all`);
}

// ================= DATE =================
function getDate(offset=0){
let d=new Date();
d.setDate(d.getDate()+offset);
return d.toLocaleDateString('en-CA');
}

</script>

</body>
</html>
