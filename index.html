<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OddGenius PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0a1a2f;color:white;text-align:center;}
.nav{background:#08121f;padding:10px;}
button{padding:10px;border:none;border-radius:10px;margin:5px;background:#00c2ff;color:white;}
.card{background:#1c2f45;margin:15px;padding:15px;border-radius:15px;}
.match{background:#233a55;margin:10px;padding:15px;border-radius:10px;}
select,input{padding:10px;border-radius:10px;border:none;}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('home')">🏠 Home</button>
<button onclick="show('matches')">⚽ Matches</button>
<button onclick="show('vip')">👑 VIP</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<h2 onclick="tapAdmin()">⚽ OddGenius AI</h2>

<!-- LOGIN -->
<div id="login">
<div class="card">
<h3>Login / Register</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>
<button onclick="loginUser()">Login</button>
</div>
</div>

<!-- HOME -->
<div id="home" style="display:none">
<div class="card">
<h3 id="welcome"></h3>
</div>

<div class="card">
<h3>💰 Payment & Help</h3>
<p>Lipa Mix: <b>0702289410 (SALEHE MGONJA)</b></p>
<p>Tuma Screenshot: <b>0757453979</b></p>

<a href="https://wa.me/255757453979" target="_blank">
<button>📲 WhatsApp</button>
</a>
</div>
</div>

<!-- MATCHES -->
<div id="matches" style="display:none">
<div class="card">
<button onclick="setMode('today')">Today</button>
<button onclick="setMode('tomorrow')">Tomorrow</button>
<button onclick="setMode('live')">Live</button>
<br><br>

<select id="league">
<option value="all">All</option>
<option value="39">EPL</option>
<option value="140">La Liga</option>
</select>

<br><br>
<button onclick="loadMatches()">Load Matches</button>
</div>

<div id="results"></div>
</div>

<!-- VIP -->
<div id="vip" style="display:none">
<div class="card">
<h3>Enter VIP Code</h3>
<input id="vipCode">
<button onclick="activateVIP()">Activate</button>
</div>

<div id="vipArea" style="display:none">
<button onclick="openVIP()">🚀 Enter VIP</button>
</div>
</div>

<!-- VIP PAGE -->
<div id="vipPage" style="display:none">
<h2>👑 VIP PICKS</h2>
<button onclick="loadVIPMatches()">Generate VIP</button>
<div id="vipResults"></div>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">
<div class="card">
<select id="days">
<option value="1">1 Day</option>
<option value="7">1 Week</option>
<option value="30">1 Month</option>
</select>
<br><br>
<button onclick="genCode()">Generate Code</button>
<p id="codeOut"></p>
</div>
</div>

<script>

const API_KEY="8a5b484376f53b6d1d4f6f2b8582f18c";

// LIMIT SYSTEM
function canGenerate(type){
let user=localStorage.getItem("currentUser");
if(!user) return false;

let key=type+"_"+user;

let data=JSON.parse(localStorage.getItem(key))||{count:0,time:Date.now()};

if(Date.now()-data.time>86400000){
data={count:0,time:Date.now()};
}

let limit=(type==="vip")?10:5;

if(data.count>=limit){
alert("Limit imefika, jaribu baada ya masaa 24");
return false;
}

data.count++;
localStorage.setItem(key,JSON.stringify(data));
return true;
}

// NAV
function show(x){
["home","matches","vip","vipPage","admin"].forEach(i=>{
document.getElementById(i).style.display="none";
});
document.getElementById(x).style.display="block";
}

// LOGIN
function register(){
localStorage.setItem(email.value,pass.value);
alert("Registered");
}

function loginUser(){
if(localStorage.getItem(email.value)===pass.value){
localStorage.setItem("currentUser",email.value);
login.style.display="none";
show("home");
welcome.innerText="Welcome "+email.value;
}else alert("Wrong");
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

window.onload=function(){
let u=localStorage.getItem("currentUser");
if(u){
login.style.display="none";
show("home");
welcome.innerText="Welcome "+u;

let vip=localStorage.getItem("vip_"+u);
if(vip && Date.now()<vip){
vipArea.style.display="block";
}
}
}

// MATCHES
async function loadMatches(){
if(!canGenerate("free")) return;

results.innerHTML="Loading...";

let res=await fetch(`https://v3.football.api-sports.io/fixtures?next=10`,{
headers:{"x-apisports-key":API_KEY}
});
let data=await res.json();

let out="";
data.response.forEach(g=>{
out+=`<div class="match">
<h3>${g.teams.home.name} vs ${g.teams.away.name}</h3>
<p>${g.league.name}</p>
</div>`;
});

results.innerHTML=out;
}

// VIP
function activateVIP(){
let code=vipCode.value;
let exp=localStorage.getItem(code);
let u=localStorage.getItem("currentUser");

if(exp && Date.now()<exp){
localStorage.setItem("vip_"+u,exp);
vipArea.style.display="block";
alert("VIP Active");
}else alert("Invalid");
}

function openVIP(){show("vipPage");}

// VIP MATCHES
async function loadVIPMatches(){
if(!canGenerate("vip")) return;

vipResults.innerHTML="Loading...";

let res=await fetch(`https://v3.football.api-sports.io/fixtures?next=10`,{
headers:{"x-apisports-key":API_KEY}
});
let data=await res.json();

let out="";
data.response.slice(0,5).forEach(g=>{
out+=`<div class="match">
<h3>${g.teams.home.name} vs ${g.teams.away.name}</h3>
<p>🔥 Strong Pick</p>
</div>`;
});

vipResults.innerHTML=out;
}

// ADMIN
function genCode(){
let code="VIP"+Math.floor(Math.random()*999999);
let days=parseInt(days.value);
let exp=Date.now()+days*86400000;
localStorage.setItem(code,exp);
codeOut.innerText=code;
}

// SECRET ADMIN
let taps=0;
function tapAdmin(){
taps++;
if(taps==5){
let p=prompt("Password");
if(p==="admin123") show("admin");
taps=0;
}
setTimeout(()=>taps=0,2000);
}

</script>

</body>
</html>
